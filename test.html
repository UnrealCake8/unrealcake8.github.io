<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NAC-DOS Web Phone</title>
<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Roboto, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: #f0f2f5;
}
.phone {
  width: 360px;
  height: 640px;
  background: #fff;
  border-radius: 20px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.25);
  display: flex;
  flex-direction: column;
  padding: 20px;
}
.status-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #0078d7;
  color: #fff;
  padding: 10px;
  border-radius: 10px;
  font-weight: bold;
  margin-bottom: 15px;
}
.panel { width: 100%; }
.panel h2, .panel h3, .panel h4 { margin: 10px 0; font-weight: 600; }
input { display:none; } /* hide any text input */
button {
  border: none;
  border-radius: 8px;
  background: #0078d7;
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
}
button:hover { background: #005ea3; }
#number-display {
  background: #eee;
  padding: 15px;
  text-align: center;
  font-size: 24px;
  border-radius: 10px;
  margin-bottom: 15px;
  letter-spacing: 2px;
}
.keypad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 15px;
}
.keypad button { padding: 20px; font-size: 18px; }
.call-log { max-height: 150px; overflow-y: auto; border-top: 1px solid #ddd; padding-top: 10px; }
.call-log ul { list-style: none; padding: 0; }
.call-log li { padding: 6px 0; border-bottom: 1px solid #eee; font-size: 14px; }
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar">
    <span id="status">Not logged in</span>
    <button id="logout-btn" onclick="logout()" style="display:none">Logout</button>
  </div>

  <!-- Login -->
  <div id="login" class="panel">
    <h2>Login to NAC-DOS</h2>
    <input id="sip-username" placeholder="SIP Username">
    <input id="sip-password" type="password" placeholder="SIP Password">
    <input id="sip-server" placeholder="SIP Server (e.g., sip.callcentric.net)">
    <button onclick="login()">Login</button>
  </div>

  <!-- Dialer Panel -->
  <div id="dialer-panel" class="panel" style="display:none">
    <h3>Phone: <span id="number-display"></span></h3>

    <!-- Keypad -->
    <div class="keypad">
      <button onclick="pressDigit('1')">1</button>
      <button onclick="pressDigit('2')">2</button>
      <button onclick="pressDigit('3')">3</button>
      <button onclick="pressDigit('4')">4</button>
      <button onclick="pressDigit('5')">5</button>
      <button onclick="pressDigit('6')">6</button>
      <button onclick="pressDigit('7')">7</button>
      <button onclick="pressDigit('8')">8</button>
      <button onclick="pressDigit('9')">9</button>
      <button onclick="pressDigit('*')">*</button>
      <button onclick="pressDigit('0')">0</button>
      <button onclick="pressDigit('#')">#</button>
    </div>

    <div class="keypad">
      <button onclick="backspace()">⌫</button>
      <button onclick="call()">📞 Call</button>
      <button onclick="clearNumber()">✖ Clear</button>
    </div>

    <!-- Call Log -->
    <div class="call-log">
      <h4>Call History</h4>
      <ul id="call-log-list"></ul>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sip.js@0.20.0/dist/sip.min.js"></script>
<script>
let ua, session;
let callLog = [];
let currentNumber = '';

window.addEventListener('load', () => {
  const savedUsername = localStorage.getItem('sipUsername');
  const savedPassword = localStorage.getItem('sipPassword');
  const savedServer = localStorage.getItem('sipServer');
  if(savedUsername && savedPassword && savedServer){
    login(savedUsername,savedPassword,savedServer);
  }
});

function login(usernameParam,passwordParam,serverParam){
  const username = usernameParam || document.getElementById('sip-username').value;
  const password = passwordParam || document.getElementById('sip-password').value;
  const server = serverParam || document.getElementById('sip-server').value;

  ua = new SIP.UA({
    uri: `sip:${username}@${server}`,
    transportOptions:{wsServers:[`wss://${server}:5061`]},
    authorizationUser: username,
    password: password
  });

  ua.on('registered',()=>{
    document.getElementById('status').innerText=`Logged in as ${username}@${server}`;
    document.getElementById('login').style.display='none';
    document.getElementById('dialer-panel').style.display='block';
    document.getElementById('logout-btn').style.display='inline-block';
    document.getElementById('number-display').innerText='';
    currentNumber='';

    localStorage.setItem('sipUsername',username);
    localStorage.setItem('sipPassword',password);
    localStorage.setItem('sipServer',server);
  });

  ua.on('registrationFailed',(err)=>alert('SIP registration failed: '+err.cause));

  ua.on('invite',(incomingSession)=>{
    alert('Incoming call from '+incomingSession.remoteIdentity.uri.toString());
    incomingSession.accept({media:{constraints:{audio:true,video:false}}});
    session=incomingSession;
    addToCallLog(`Incoming: ${incomingSession.remoteIdentity.uri.user} @ ${new Date().toLocaleTimeString()}`);
  });
}

function pressDigit(d){ 
  currentNumber+=d;
  document.getElementById('number-display').innerText=currentNumber;
}
function backspace(){
  currentNumber=currentNumber.slice(0,-1);
  document.getElementById('number-display').innerText=currentNumber;
}
function clearNumber(){
  currentNumber='';
  document.getElementById('number-display').innerText=currentNumber;
}

function call(){
  if(!currentNumber){ alert('Enter a number'); return; }
  const server=localStorage.getItem('sipServer');
  session = ua.invite(`sip:${currentNumber}@${server}`, {media:{constraints:{audio:true,video:false}}});
  session.on('accepted',()=>{
    alert('Call connected!');
    addToCallLog(`Outgoing: ${currentNumber} @ ${new Date().toLocaleTimeString()}`);
  });
  session.on('terminated',()=>alert('Call ended'));
  clearNumber();
}

function logout(){
  if(ua) ua.stop();
  localStorage.removeItem('sipUsername');
  localStorage.removeItem('sipPassword');
  localStorage.removeItem('sipServer');
  document.getElementById('login').style.display='block';
  document.getElementById('dialer-panel').style.display='none';
  document.getElementById('logout-btn').style.display='none';
  document.getElementById('status').innerText='Not logged in';
  document.getElementById('number-display').innerText='';
  currentNumber='';
}

function addToCallLog(entry){
  callLog.unshift(entry);
  const logList=document.getElementById('call-log-list');
  logList.innerHTML='';
  callLog.forEach(e=>{
    const li=document.createElement('li');
    li.innerText=e;
    logList.appendChild(li);
  });
}
</script>
</body>
</html>
